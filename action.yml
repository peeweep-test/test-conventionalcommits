# action.yml
name: "conventionalcommits-checker"
author: BLumia
branding:
  icon: "check"
  color: "black"
description: "check commits inside a Pull Request"
inputs:
  github_token:
    description: "action github token"
    required: false

runs:
  using: "composite"
  steps:
    - name: debug output
      shell: bash
      run: |
        echo "=== DEBUG ==="
        ls -la
        echo "=== Files above ==="
        pwd
        echo "=== PWD above ==="
        echo "PR Body: ${{ github.event.pull_request.body }}"
        echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
        echo "Head SHA: ${{ github.event.pull_request.head.sha }}"
        echo "Done"