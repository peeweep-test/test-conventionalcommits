name: Test Conventional Commits

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git
        run: sudo apt-get update && sudo apt-get install -y git
      - name: Run action
        uses: ./action.yml
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}